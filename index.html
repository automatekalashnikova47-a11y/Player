<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Iframe Player</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #000;
  overflow: hidden;
}

/* Fullscreen iframe */
#iframePlayer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  border: none;
}

/* Optional small menu */
#menu {
  position: fixed;
  bottom: 10px;
  left: 10px;
  z-index: 9999;
}

#menu button {
  padding: 8px 10px;
  margin: 4px;
  border: none;
  background: rgba(0,0,0,0.6);
  color: white;
  border-radius: 6px;
}
</style>
</head>

<body>

<iframe id="iframePlayer" allowfullscreen></iframe>

<!-- Optional controls -->
<div id="menu">
  <button onclick="loadPage('https://streamcrichd.com/update/skys2.php')">Page 1</button>
  <button onclick="loadPage('https://streamcrichd.com/update/skys2.php')">Page 2</button>
</div>

<script>
const iframe = document.getElementById("iframePlayer");

function loadPage(url) {
  iframe.src = url;
}

// Auto load default page
loadPage("https://go.webcric.com/frame1.htm");
</script>

</body>
</html>
